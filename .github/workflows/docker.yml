name: Docker

# Merge to main IS the prod deploy: build + push the image, then bump the pinned
# tag in wharf-deployment/overlays/main. ArgoCD reconciles the commit onto the cluster.
on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/janne6565/wharf-backend
  DEPLOY_REPO: Janne6565/wharf-deployment
  OVERLAY_PATH: overlays/main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute immutable image tag
        id: meta
        run: echo "tag=main-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Separate job so a missing/invalid DEPLOY_REPO_SSH_KEY fails ONLY the tag bump —
  # the image is already built and pushed above. The secret is the private half of a
  # write deploy key on wharf-deployment (repo-scoped, unlike a PAT).
  bump-deployment:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Check out wharf-deployment
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOY_REPO }}
          ssh-key: ${{ secrets.DEPLOY_REPO_SSH_KEY }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      # Backend and web bumps can land concurrently on the same repo — on a rejected
      # push, reset to the remote head and re-apply the pin instead of failing.
      - name: Pin backend image to the immutable tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            (cd ${{ env.OVERLAY_PATH }} && kustomize edit set image ${{ env.IMAGE }}=${{ env.IMAGE }}:${{ needs.build-and-push.outputs.tag }})
            git add ${{ env.OVERLAY_PATH }}/kustomization.yaml
            if git diff --cached --quiet; then
              echo "No image change to commit."
              exit 0
            fi
            git commit -m "ci: update backend image to ${{ needs.build-and-push.outputs.tag }}"
            if git push; then
              exit 0
            fi
            echo "Push rejected (concurrent bump) — retrying on latest main ($attempt/5)."
            git fetch origin main
            git reset --hard origin/main
          done
          echo "Failed to push the image bump after 5 attempts." >&2
          exit 1
