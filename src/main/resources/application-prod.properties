# Production profile: PostgreSQL, all connection details injected via environment.
# No default for the DB password: prod must supply DB_PASSWORD or fail to start.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/wharf}
spring.datasource.username=${DB_USERNAME:wharf}
spring.datasource.password=${DB_PASSWORD}

auth.cookie.secure=true
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://wharf.sh}

# Public origin used to build the OAuth provider redirect_uri.
oauth.public-base-url=${OAUTH_PUBLIC_BASE_URL:https://wharf.jannekeipert.de}

# Deployed behind Traefik, which overwrites X-Forwarded-For with the real client IP.
rate-limit.trust-forwarded-header=true
