# Local development profile: in-memory H2 in PostgreSQL-compatibility mode so the
# Flyway migrations that target Postgres also apply cleanly here.
spring.datasource.url=jdbc:h2:mem:wharf;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

# Cookies are sent over plain HTTP locally.
auth.cookie.secure=false
