spring.application.name=wharf-backend
spring.profiles.active=dev

# --- Persistence -------------------------------------------------------------
# Schema is owned by Flyway; never let Hibernate touch DDL outside of local dev.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# --- JWT ---------------------------------------------------------------------
# The secret MUST be overridden in every non-local environment via JWT_SECRET_KEY.
# The value below is an insecure development fallback only (documented in README).
jwt.secret-key=${JWT_SECRET_KEY:dev-only-insecure-secret-change-me-0123456789abcdef}
jwt.identity-expiration=PT15M
jwt.refresh-expiration=P30D
jwt.issuer=wharf-backend

# --- Refresh cookie ----------------------------------------------------------
auth.cookie.name=wharf_refresh
auth.cookie.secure=true
auth.cookie.same-site=Strict
auth.cookie.path=/api/v1/auth

# --- Vault -------------------------------------------------------------------
# Server never parses the blob; it only enforces a hard size ceiling.
vault.max-size-bytes=1048576

# --- Projects (team workspaces) ----------------------------------------------
# How long a project invite stays valid before it is treated as expired
# (ISO-8601 duration; default 14 days).
wharf.projects.invite-ttl=P14D

# --- Request body limits -----------------------------------------------------
# Global ceiling on request bodies (~1.5 MiB), leaving headroom over the base64
# vault cap so an oversized payload is bounded at the container before it reaches
# the app. The per-field @Size + VaultService checks are the authoritative guards.
server.tomcat.max-http-form-post-size=1572864
server.tomcat.max-swallow-size=1572864

# --- Device codes ------------------------------------------------------------
device-code.ttl=PT10M

# --- CORS --------------------------------------------------------------------
app.cors.allowed-origins=http://localhost:5173

# --- Rate limiting (Bucket4j, per client IP) ---------------------------------
rate-limit.enabled=true
# Trust X-Forwarded-For only behind a proxy that overwrites it (see application-prod).
rate-limit.trust-forwarded-header=false
rate-limit.auth-capacity=20
rate-limit.auth-refill-period=PT1M
rate-limit.recovery-capacity=5
rate-limit.recovery-refill-period=PT1M

# --- OAuth social login ------------------------------------------------------
# OAuth links an external identity to a local account, then the app issues its own JWTs.
# NO SECRETS IN GIT: client id/secret default to empty; a provider is disabled until both
# are supplied. public-base-url builds the provider redirect_uri
# <public-base-url>/api/v1/auth/oauth/{provider}/callback (prod sets https://wharf.jannekeipert.de).
oauth.public-base-url=${OAUTH_PUBLIC_BASE_URL:http://localhost:8080}
oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
oauth.github.client-id=${OAUTH_GITHUB_CLIENT_ID:}
oauth.github.client-secret=${OAUTH_GITHUB_CLIENT_SECRET:}

# --- OpenAPI -----------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
