# Test profile: in-memory H2 in PostgreSQL-compatibility mode with Flyway applied,
# so the integration tests exercise the same schema that ships to production.
spring.datasource.url=jdbc:h2:mem:wharf-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

jwt.secret-key=test-only-secret-key-0123456789abcdef-0123456789
auth.cookie.secure=false
rate-limit.enabled=false
